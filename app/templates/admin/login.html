<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 | {{ site_name }}</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body class="admin-login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect width="28" height="28" rx="6" fill="#2563eb"/>
          <path d="M7 8h8M7 12h10M7 16h6M7 20h8" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="21" cy="19" r="4" fill="#60a5fa"/>
        </svg>
        <span>Logit 관리자</span>
      </div>

      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/admin/login" class="login-form">
        <div class="form-group">
          <label for="email" class="form-label">이메일</label>
          <input type="email" id="email" name="email" class="form-input" required
                 placeholder="admin@logit.kr" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password" class="form-label">비밀번호</label>
          <input type="password" id="password" name="password" class="form-input" required
                 placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full">로그인</button>
      </form>

      <p class="login-back"><a href="/">← 블로그로 돌아가기</a></p>
    </div>
  </div>
</body>
</html>
