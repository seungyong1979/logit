<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>{{ page_title | default(site_name) }}</title>
<meta name="description" content="{{ meta_description | default('AI 활용, 자동화, 생산성 도구를 직접 써보고 정리하는 개인 블로그') }}">
<meta name="robots" content="{{ meta_robots | default('index, follow') }}">
<meta name="author" content="{{ site_name }}">
<meta name="language" content="Korean">

<!-- Open Graph -->
<meta property="og:type" content="{{ og_type | default('website') }}">
<meta property="og:url" content="{{ canonical_url | default(base_url) }}">
<meta property="og:title" content="{{ page_title | default(site_name) }}">
<meta property="og:description" content="{{ meta_description | default('실행하는 사람의 기록이 쌓이는 곳') }}">
<meta property="og:image" content="{{ og_image | default(base_url + '/static/images/og-default.png') }}">
<meta property="og:site_name" content="{{ site_name }}">
<meta property="og:locale" content="ko_KR">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page_title | default(site_name) }}">
<meta name="twitter:description" content="{{ meta_description | default('실행하는 사람의 기록이 쌓이는 곳') }}">
<meta name="twitter:image" content="{{ og_image | default(base_url + '/static/images/og-default.png') }}">

{% if canonical_url %}
<link rel="canonical" href="{{ canonical_url }}">
{% endif %}
<link rel="alternate" type="application/rss+xml" title="{{ site_name }} RSS" href="/rss.xml">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

<!-- Styles -->
<link rel="stylesheet" href="/static/css/style.css">

{% if adsense_client %}
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ adsense_client }}" crossorigin="anonymous"></script>
{% endif %}

{% if ga_id %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ ga_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ ga_id }}');
</script>
{% endif %}
