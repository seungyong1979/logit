services:
  - type: web
    name: logit-blog
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Logit
      - key: APP_ENV
        value: production
      - key: BASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: logit-db
          property: connectionString
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADSENSE_CLIENT_ID
        sync: false
      - key: GA_MEASUREMENT_ID
        sync: false

databases:
  - name: logit-db
    databaseName: logit
    user: logit
    plan: free
